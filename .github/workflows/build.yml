name: Build & Cache

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  x86:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: wimpysworld/nothing-but-nix@main

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: accept-flake-config = true

      - uses: cachix/cachix-action@v15
        with:
          name: cramt
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build saturn
        run: nix build .#nixosConfigurations.saturn.config.system.build.toplevel --print-build-logs

      - name: Build mars
        if: always()
        run: nix build .#nixosConfigurations.mars.config.system.build.toplevel --print-build-logs

      - name: Build luna
        if: always()
        run: nix build .#nixosConfigurations.luna.config.system.build.toplevel --print-build-logs

  arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: wimpysworld/nothing-but-nix@main

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: accept-flake-config = true

      - uses: cachix/cachix-action@v15
        with:
          name: cramt
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build eros
        run: nix build .#nixosConfigurations.eros.config.system.build.toplevel --print-build-logs
